[files]
extend-exclude = [
    "docs/ACCESSIBILITE.md",
    "docs/ARCHITECTURE.md",
    "docs/COMMANDES.md",
    "docs/SECURITE.md",
    "CHANGELOG.md",
    "CONTRIBUTING.md",
    "README.md",
    "WORK.md",
    "albert-code.sh",
    "albert-code.bat",
]

[default]
extend-ignore-re = ["(?m)^.*(#|//)\\s*typos:disable-line$", "datas"]

[default.extend-words]
iterm = "iterm"
ITERM = "ITERM"
asend = "asend"
ype = "ype"
# French words shared with English false-positives (kept in commit messages,
# .gitignore, code comments). The typos hook reverts these otherwise.
projet = "projet"
Environnements = "Environnements"
